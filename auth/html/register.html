<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Site - Register</title>
</head>

<body>
    <h1>Welcome to the Auction Site</h1>
    <h2>Create an Account</h2>

    <!-- Registration Form -->
    <form action="/auth.cgi" method="POST">
        <label for="reg_username">Username:</label>
        <input type="text" id="reg_username" name="username" required>
        <br><br>
        <label for="reg_first">First Name:</label>
        <input type="text" id="reg_first" name="first_name" required>
        <br><br>
        <label for="reg_last">Last Name:</label>
        <input type="text" id="reg_last" name="last_name" required>
        <br><br>
        <label for="reg_email">Email Address:</label>
        <input type="email" id="reg_email" name="email" required>
        <br><br>
        <label for="reg_password">Password:</label>
        <input type="password" id="reg_password" name="password" required>
        <br><br>
        <button type="submit" name="action" value="register">Register</button>
    </form>

    <hr>
    <p>Already have an account? <a href="/login.html">Click here to login</a></p>

</body>

</html>
